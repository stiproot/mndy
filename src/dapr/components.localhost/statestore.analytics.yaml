apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: statestore-analytics
scopes:
  - mndy-dapr-mcp
spec:
  type: state.mongodb
  version: v1
  initTimeout: 5m
  metadata:
  - name: host
    value: "localhost:27017"
  - name: databaseName
    value: "mndy"
  - name: collectionName
    value: "analytics_cache"
  - name: keyPrefix
    value: "none"
  - name: params
    value: "?authSource=admin&replicaSet=rs0&directConnection=true"
