apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub-client-update
scopes:
  - mndy-ui-api
  - mndy-workflows-worker
spec:
  type: pubsub.rabbitmq
  version: v1
  initTimeout: 30s
  ignoreErrors: true  # Allow startup without RabbitMQ for local dev
  metadata:
    - name: connectionString
      value: amqp://localhost:5672
