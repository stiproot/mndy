name: mndy

# =============================================================================
# Profiles:
#   - (none)     : Infrastructure only (Dapr, MongoDB, RabbitMQ, Zipkin)
#   - apps       : All application services (workers, UI, API)
#   - ai         : AI services (cc-svc, github-issues-mcp, ga4-mcp, meta-ads-mcp, shopify-mcp)
#
# Usage:
#   docker compose up                    # Infrastructure only
#   docker compose --profile apps up     # Everything
#   docker compose --profile ai up       # AI services only
# =============================================================================

x-daprdimage: &daprdimage
  image: daprio/daprd:1.16.9
  volumes:
    - ./src/dapr/components/:/components
    - ./src/dapr/configuration/:/configuration

services:
  ##############################################
  #           Dapr placement service           #
  ##############################################
  placement:
    image: daprio/placement:1.16.9
    container_name: placement-mndy
    command: ["./placement", "-port", "50006"]
    ports:
      - 50000:50006

  scheduler:
    image: daprio/dapr:1.16.9
    container_name: scheduler-mndy
    command: ["./scheduler", "--port", "50006"]
    ports:
      - "50006:50006"
    restart: unless-stopped

  ##############################################
  #                   RabbitMQ                 #
  ##############################################
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-mndy
    healthcheck:
      test: rabbitmq-diagnostics -q ping && rabbitmq-diagnostics -q status
      interval: 30s
      timeout: 30s
      retries: 3
    ports:
      - 5672:5672
      - 15672:15672

  ##############################################
  #                   MongoDB                  #
  ##############################################
  mongo:
    image: mongo:7
    container_name: mongo-mndy
    command: [--replSet, rs0, --bind_ip_all, --port, "27017"]
    ports:
      - 27017:27017
    healthcheck:
      test: test $$(mongosh --port 27017 --quiet --eval "try {rs.initiate({_id:'rs0',members:[{_id:0,host:\"mongo:27017\"}]})} catch(e) {rs.status().ok}") -eq 1
      interval: 10s
      start_period: 30s
    volumes:
      - mongodb-data:/data/keyfile

  mongo-express:
    image: mongo-express:latest
    container_name: mongo-express-mndy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo-mndy
    depends_on:
      mongo:
        condition: service_healthy

  ##############################################
  #                   Zipkin                   #
  ##############################################
  zipkin:
    image: openzipkin/zipkin-slim
    container_name: zipkin-mndy
    ports:
      - 9411:9411

  ##############################################
  #  Workflows Worker Service + Dapr sidecar   #
  ##############################################
  mndy-workflows-worker:
    profiles: [apps]
    image: xo-feed/mndy/workflows-worker:dev
    build:
      context: .
      dockerfile: src/workflows-worker/Dockerfile
      tags:
        - xo-feed/mndy/workflows-worker:dev
    ports:
      - "6006:8001"
    environment:
      - DEBUGGING=False
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mndy-workflows-worker-dapr:
    profiles: [apps]
    <<: *daprdimage
    command: [ "./daprd",
      "--app-id", "mndy-workflows-worker",
      "--app-port", "8001",
      "--placement-host-address", "placement:50006",
      "--resources-path", "/components",
      "--config", "/configuration/config.yaml" ]
    depends_on:
      - mndy-workflows-worker
    network_mode: service:mndy-workflows-worker

  ########################################
  #  AzDO Worker Service + Dapr sidecar  #
  ########################################
  mndy-azdo-worker:
    profiles: [apps]
    image: xo-feed/mndy/azdo-worker:dev
    build:
      context: .
      dockerfile: src/azdo-worker/Dockerfile
      tags:
        - xo-feed/mndy/azdo-worker:dev
    ports:
      - "6003:8001"
    environment:
      - DEBUGGING=False
      - API_KEY=${BASE64_AZDO_PAT}
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mndy-azdo-worker-dapr:
    profiles: [apps]
    <<: *daprdimage
    command: [ "./daprd",
      "--app-id", "mndy-azdo-worker",
      "--app-port", "8001",
      "--placement-host-address", "placement:50006",
      "--resources-path", "/components",
      "--config", "/configuration/config.yaml" ]
    depends_on:
      - mndy-azdo-worker
    network_mode: service:mndy-azdo-worker

  ############################################
  #  Insights Worker Service + Dapr sidecar  #
  ############################################
  mndy-insights-worker:
    profiles: [apps]
    image: xo-feed/mndy/insights-worker:dev
    build:
      context: .
      dockerfile: src/insights-worker/Dockerfile
      tags:
        - xo-feed/mndy/insights-worker:dev
    ports:
      - "6004:8001"
    environment:
      - DEBUGGING=False
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mndy-insights-worker-dapr:
    profiles: [apps]
    <<: *daprdimage
    command: [ "./daprd",
      "--app-id", "mndy-insights-worker",
      "--app-port", "8001",
      "--placement-host-address", "placement:50006",
      "--resources-path", "/components",
      "--config", "/configuration/config.yaml" ]
    depends_on:
      - mndy-insights-worker
    network_mode: service:mndy-insights-worker

  ##############################################
  #  AzDO Proxy Worker Service + Dapr sidecar  #
  ##############################################
  mndy-azdoproxy-worker:
    profiles: [apps]
    image: xo-feed/mndy/azdoproxy-worker:dev
    build:
      context: .
      dockerfile: src/azdoproxy-worker/Dockerfile
      tags:
        - xo-feed/mndy/azdoproxy-worker:dev
    ports:
      - "6005:8001"
    environment:
      - DEBUGGING=False
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mndy-azdoproxy-worker-dapr:
    profiles: [apps]
    <<: *daprdimage
    command: [ "./daprd",
      "--app-id", "mndy-azdoproxy-worker",
      "--app-port", "8001",
      "--placement-host-address", "placement:50006",
      "--resources-path", "/components",
      "--config", "/configuration/config.yaml" ]
    depends_on:
      - mndy-azdoproxy-worker
    network_mode: service:mndy-azdoproxy-worker

  ###################################
  #  AzDO Proxy API + Dapr sidecar  #
  ###################################
  mndy-azdoproxy-api:
    profiles: [apps]
    image: xo-feed/mndy/azdoproxy-api:dev
    build:
      context: ./src/azdoproxy-api/
      dockerfile: Dockerfile
      tags:
        - xo-feed/mndy/azdoproxy-api:dev
    dns:
      - "10.1.4.11"
      - "10.1.4.12"
    ports:
      - 5079:5000
    environment:
      - ASPNETCORE_URLS=http://+:5000

  #########################################
  #           UI API + Dapr sidecar       #
  #########################################
  mndy-ui-api:
    profiles: [apps]
    image: xo-feed/mndy/ui-api:dev
    build:
      context: ./src/ui-api/
      dockerfile: Dockerfile
      tags:
        - xo-feed/mndy/ui-api:dev
    ports:
      - 3002:3002
    environment:
      - PORT=3001
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mndy-ui-api-dapr:
    profiles: [apps]
    <<: *daprdimage
    command: [ "./daprd",
      "--app-id", "mndy-ui-api",
      "--dapr-http-port", "3500",
      "--app-port", "3002",
      "--placement-host-address", "placement:50006",
      "--resources-path", "/components",
      "--config", "/configuration/config.yaml" ]
    depends_on:
      - mndy-ui-api
      - mndy-workflows-worker
    network_mode: service:mndy-ui-api

  ###################################################
  #                       UI                        #
  ###################################################
  mndy-ui:
    profiles: [apps]
    image: xo-feed/mndy/ui:dev
    build:
      context: ./src/apps/ui/
      dockerfile: Dockerfile
      tags:
        - xo-feed/mndy/ui:dev
    ports:
      - 8080:8081
    environment:
      - VUE_APP_UI_API_BASE_URL=http://localhost:3004/ui-api
    depends_on:
      - mndy-ui-api

  ###################################################
  #                      VIS                        #
  ###################################################
  mndy-vis:
    profiles: [apps]
    image: xo-feed/mndy/vis:dev
    build:
      context: ./src/apps/vis/
      dockerfile: Dockerfile
      tags:
        - xo-feed/mndy/vis:dev
    ports:
      - 8082:8082

  ###################################################
  #                      AZDO                       #
  ###################################################
  mndy-azdo:
    profiles: [apps]
    image: xo-feed/mndy/azdo:dev
    build:
      context: ./src/apps/azdo/
      dockerfile: Dockerfile
      tags:
        - xo-feed/mndy/azdo:dev
    ports:
      - 8083:8083

  ##############################################
  #  GitHub Issues MCP Server (AI profile)    #
  ##############################################
  github-issues-mcp:
    profiles: [ai]
    image: xo-feed/mndy/github-issues-mcp:dev
    build:
      context: .
      dockerfile: src/github-issues-mcp/Dockerfile
      tags:
        - xo-feed/mndy/github-issues-mcp:dev
    ports:
      - "3001:3001"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=3001
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ##############################################
  #  Google Analytics 4 MCP Server (AI profile)#
  ##############################################
  ga4-mcp:
    profiles: [ai]
    image: xo-feed/mndy/ga4-mcp:dev
    build:
      context: .
      dockerfile: src/ga4-mcp/Dockerfile
      tags:
        - xo-feed/mndy/ga4-mcp:dev
    ports:
      - "3003:3003"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/ga4-service-account.json
      - GA4_PROPERTY_ID=${GA4_PROPERTY_ID}
      - PORT=3003
    volumes:
      - ./secrets/ga4-service-account.json:/secrets/ga4-service-account.json:ro
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3003/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ##############################################
  #  Meta Ads MCP Server (AI profile)          #
  ##############################################
  meta-ads-mcp:
    profiles: [ai]
    image: xo-feed/mndy/meta-ads-mcp:dev
    build:
      context: .
      dockerfile: src/meta-ads-mcp/Dockerfile
      tags:
        - xo-feed/mndy/meta-ads-mcp:dev
    ports:
      - "3004:3004"
    environment:
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}
      - PORT=3004
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3004/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ##############################################
  #  Shopify MCP Server (AI profile)           #
  ##############################################
  shopify-mcp:
    profiles: [ai]
    image: xo-feed/mndy/shopify-mcp:dev
    build:
      context: .
      dockerfile: src/shopify-mcp/Dockerfile
      tags:
        - xo-feed/mndy/shopify-mcp:dev
    ports:
      - "3005:3005"
    environment:
      - SHOPIFY_ACCESS_TOKEN=${SHOPIFY_ACCESS_TOKEN}
      - SHOPIFY_STORE_URL=${SHOPIFY_STORE_URL}
      - PORT=3005
    healthcheck:
      test: ["CMD", "bun", "--eval", "fetch('http://localhost:3005/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  ##############################################
  #  Claude Code Service (AI profile)         #
  ##############################################
  cc-svc:
    profiles: [ai]
    image: xo-feed/mndy/cc-svc:dev
    build:
      context: .
      dockerfile: src/cc-svc/Dockerfile
      tags:
        - xo-feed/mndy/cc-svc:dev
    ports:
      - "3002:3002"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - GITHUB_ISSUES_MCP_URL=http://github-issues-mcp:3001/mcp
      - GA4_MCP_URL=http://ga4-mcp:3003/mcp
      - META_MCP_URL=http://meta-ads-mcp:3004/mcp
      - SHOPIFY_MCP_URL=http://shopify-mcp:3005/mcp
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - PORT=3002
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - MAX_ORCHESTRATOR_TURNS=${MAX_ORCHESTRATOR_TURNS:-10}
      - MAX_SUBAGENT_TURNS=${MAX_SUBAGENT_TURNS:-5}
      - MAX_BUDGET_USD=${MAX_BUDGET_USD:-1.00}
      - MAX_SUBAGENT_BUDGET_USD=${MAX_SUBAGENT_BUDGET_USD:-0.25}
    depends_on:
      github-issues-mcp:
        condition: service_healthy
      ga4-mcp:
        condition: service_healthy
      meta-ads-mcp:
        condition: service_healthy
      shopify-mcp:
        condition: service_healthy

volumes:
  mongodb-data:

networks:
  default:
    driver: bridge
